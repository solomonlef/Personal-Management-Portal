<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RK Group | Management Reports</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #38bdf8;
            --success: #10b981;
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header {
            width: 100%;
            padding: 2.5rem 0;
            text-align: center;
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            margin-bottom: 3rem;
        }

        .container {
            width: 90%;
            max-width: 800px;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .filter-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        @media (max-width: 600px) {
            .filter-group { grid-template-columns: 1fr; }
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }

        select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
        }

        select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        .btn-submit:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        .results-section {
            margin-top: 40px;
            width: 95%;
            max-width: 1200px;
            text-align: center;
            padding-bottom: 50px;
        }

        .report-frame {
            width: 100%;
            height: 750px;
            border: 2px solid #334155;
            border-radius: 12px;
            background: white;
            margin-top: 20px;
            display: none;
        }

        .placeholder-text {
            color: #94a3b8;
            font-style: italic;
            margin: 20px 0;
            font-size: 1.1rem;
        }

        .action-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
            flex-wrap: wrap;
        }

        .action-btn {
            padding: 12px 24px;
            background: #1e293b;
            color: white;
            border: 1px solid var(--primary);
            border-radius: 8px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-edit {
            border-color: var(--success);
        }

        .btn-edit:hover {
            background: var(--success);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .action-btn:hover {
            background: var(--primary);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Personal Management Portal</h1>
        <p>Operational Reports & Real-time Documentation</p>
    </div>

    <div class="container">
        <form id="filterForm">
            <div class="filter-group">
                <div>
                    <label for="check">Report Category</label>
                    <select id="check" required>
                        <option value="" disabled selected>Select Category...</option>
                        <option value="RK Paradise Offline menu">RK Paradise Offline menu</option>
                        <option value="RK Paradise Online Menu">RK Paradise Online Menu</option>
                        <option value="RK Restaurant Offline menu">RK Restaurant Offline menu</option>
                        <option value="RK Restaurant Online Menu">RK Restaurant Online Menu</option>
                        <option value="RK Chinese bandi online menu">RK Chinese bandi online menu</option>
                        <option value="RK Kitchen Online menu">RK Kitchen Online menu</option>
                        <option value="RK mess online menu">RK mess online menu</option>
                        <option value="RK mess offline menu">RK mess offline menu</option>
                        <option value="Phone numbers">Phone numbers</option>
                        <option value="GST">GST</option>
                        <option value="TDS">TDS</option>
                        <option value="Trade Mark">Trade Mark</option>
                        <option value="Addhar cards">Addhar cards</option>
                    </select>
                </div>

                <div>
                    <label for="year">Year</label>
                    <select id="year" required>
                        <option value="" disabled selected>Select Year...</option>
                        <option>2025</option>
                        <option>2026</option>
                        <option>2027</option>
                        <option>2028</option>
                        <option>2029</option>
                        <option>2030</option>
                    </select>
                </div>
            </div>

            <button type="submit" class="btn-submit">Generate Report</button>
        </form>
    </div>

    <div class="results-section">
        <h3>Report Viewer</h3>
        <p id="placeholder" class="placeholder-text">Choose a category and year to view details</p>
        
        <iframe id="reportFrame" class="report-frame"></iframe>

        <div id="actionButtons" class="action-buttons hidden">
            <button onclick="editDoc()" class="action-btn btn-edit">✏️ Edit Report</button>
            <button id="downloadBtn" onclick="downloadDoc()" class="action-btn">⬇️ Download File</button>
            <button onclick="window.print()" class="action-btn">🖨️ Print Report</button>
            <button onclick="shareReport()" class="action-btn">📤 Share Report</button>
        </div>
    </div>

    <script>
        // Data Store IDs
        const PHONE_SHEET_ID = "1tAukTsFEJ8H5DSoAIQaOiOX2Z3aPqJmN8quXWXzKJVA";
        const PARADISE_OFFLINE_ID = "1SFIu0yoQI5G6OEZGSK5CS_5eohhVWY8g";
        const PARADISE_ONLINE_ID = "1n6TUS3eEhajlFmUJESYZGSofjEamDU0W"; // New Online Menu ID

        let currentId = "";
        let currentType = ""; // 'sheet' or 'doc'

        document.getElementById('filterForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const category = document.getElementById('check').value;
            const year = document.getElementById('year').value;
            const frame = document.getElementById('reportFrame');
            const placeholder = document.getElementById('placeholder');
            const actionButtons = document.getElementById('actionButtons');
            const downloadBtn = document.getElementById('downloadBtn');

            // Reset
            currentId = "";
            currentType = "";

            // Mapping Logic
            if (category === "Phone numbers" && year === "2025") {
                currentId = PHONE_SHEET_ID;
                currentType = "sheet";
                frame.src = `https://docs.google.com/spreadsheets/d/${currentId}/preview`;
                downloadBtn.innerHTML = "⬇️ Download Excel";
            } 
            else if (category === "RK Paradise Offline menu" && year === "2026") {
                currentId = PARADISE_OFFLINE_ID;
                currentType = "doc";
                frame.src = `https://docs.google.com/document/d/${currentId}/preview`;
                downloadBtn.innerHTML = "⬇️ Download PDF";
            }
            else if (category === "RK Paradise Online Menu" && year === "2026") {
                currentId = PARADISE_ONLINE_ID;
                currentType = "doc";
                frame.src = `https://docs.google.com/document/d/${currentId}/preview`;
                downloadBtn.innerHTML = "⬇️ Download PDF";
            }

            // Display Logic
            if (currentId) {
                frame.style.display = 'block';
                placeholder.innerHTML = `Showing results for: <strong>${category}</strong> - <strong>${year}</strong>`;
                actionButtons.classList.remove('hidden');
            } else {
                placeholder.innerHTML = `❌ No report found for <strong>${category} - ${year}</strong>.`;
                frame.style.display = 'none';
                actionButtons.classList.add('hidden');
            }
        });

        function editDoc() {
            const baseUrl = currentType === "sheet" ? "spreadsheets" : "document";
            window.open(`https://docs.google.com/${baseUrl}/d/${currentId}/edit`, '_blank');
        }

        function downloadDoc() {
            if (currentType === "sheet") {
                window.open(`https://docs.google.com/spreadsheets/d/${currentId}/export?format=xlsx`, '_blank');
            } else {
                window.open(`https://docs.google.com/document/d/${currentId}/export?format=pdf`, '_blank');
            }
        }

        function shareReport() {
            const baseUrl = currentType === "sheet" ? "spreadsheets" : "document";
            const url = `https://docs.google.com/${baseUrl}/d/${currentId}/edit?usp=sharing`;
            const title = `RK Group Report`;

            if (navigator.share) {
                navigator.share({ title, url }).catch(err => console.log(err));
            } else {
                navigator.clipboard.writeText(url).then(() => alert('Link copied to clipboard!'));
            }
        }
    </script>
</body>

</html>
