<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Management Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #38bdf8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .login-container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-area {
            margin-bottom: 2rem;
        }

        .logo-area h1 {
            color: var(--primary);
            font-weight: 600;
            letter-spacing: -1px;
            margin: 0;
        }

        .logo-area p {
            color: var(--accent);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 600;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px;
            background: #0f172a;
            border: 1px solid #334155;
            color: white;
            border-radius: 8px;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input[type="password"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        .btn-login:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
        }

        #errorMessage {
            color: #ef4444;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
            padding: 10px;
            background: rgba(239, 68, 68, 0.1);
            border-radius: 6px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <h1>Jesus Prayer</h1>
            <p>Admin Portal</p>
        </div>

        <form id="loginForm" onsubmit="validateAccess(event)">
            <div class="input-group">
                <label for="password">MANAGEMENT PASSWORD</label>
                <input type="password" id="password" placeholder="••••••••" required autofocus>
            </div>
            
            <button type="submit" class="btn-login">Verify Identity</button>
            
            <div id="errorMessage">❌ Access Denied: Incorrect Password</div>
        </form>
    </div>

    <script>
        function validateAccess(event) {
            event.preventDefault(); // Prevents page refresh
            
            const passwordInput = document.getElementById('password').value;
            const errorDisplay = document.getElementById('errorMessage');

            // The required password
            const SECRET_KEY = "solomonbible";

            if (passwordInput === SECRET_KEY) {
                // SUCCESS: Go to home.html
                window.location.href = "home.html";
            } else {
                // FAILURE: Show error
                errorDisplay.style.display = 'block';
                document.getElementById('password').value = '';
                
                // Shake effect for feedback
                const container = document.querySelector('.login-container');
                container.style.animation = 'none';
                setTimeout(() => {
                    container.style.border = '1px solid #ef4444';
                }, 10);
            }
        }
    </script>
</body>
</html>
